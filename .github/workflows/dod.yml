name: DoD Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - main
      - develop

concurrency:
  group: dod-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    shell: pwsh

env:
  CMAKE_BUILD_TYPE: Release
  BUILD_DIR: build

jobs:
  dod-check:
    name: Definition of Done
    runs-on: windows-2022
    if: github.repository != 'wesleysimplicio/agentic-starter'
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSVC developer shell
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: >
          cmake -S . -B $env:BUILD_DIR -G Ninja
          -DCMAKE_BUILD_TYPE=$env:CMAKE_BUILD_TYPE
          -DUS4_ENABLE_TESTS=ON
          -DUS4_ENABLE_BENCHMARKS=OFF

      - name: Build project
        run: cmake --build $env:BUILD_DIR --config $env:CMAKE_BUILD_TYPE --parallel

      - name: Run CTest
        run: ctest --test-dir $env:BUILD_DIR --build-config $env:CMAKE_BUILD_TYPE --output-on-failure

      - name: Run clang-format when available
        run: |
          if (Get-Command clang-format -ErrorAction SilentlyContinue) {
            $files = git ls-files '*.cpp' '*.h'
            if ($files) {
              clang-format --dry-run --Werror $files
            } else {
              Write-Host 'No C/C++ files tracked for clang-format.'
            }
          } else {
            Write-Warning 'clang-format not found on runner; DoD lint placeholder skipped.'
          }

      - name: Run clang-tidy when available
        run: |
          if (Get-Command clang-tidy -ErrorAction SilentlyContinue) {
            $files = git ls-files 'runtime/**/*.cpp'
            if ($files) {
              clang-tidy -p $env:BUILD_DIR $files
            } else {
              Write-Host 'No runtime sources tracked for clang-tidy.'
            }
          } else {
            Write-Warning 'clang-tidy not found on runner; DoD lint placeholder skipped.'
          }

      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ($env:PR_TITLE -notmatch '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([^)]+\))?(!)?: .+') {
            Write-Error 'PR title must follow Conventional Commits, for example: feat(runtime): select directml fallback'
          }

      - name: Validate task reference in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PR_BODY)) {
            Write-Error 'PR body is empty. Add the related task or issue reference.'
          }

          $hasTaskReference = $env:PR_BODY -match '(#[0-9]+|\.specs/sprints/.+\.task\.md|[0-9]{2,3}-[a-z0-9-]+\.task\.md)'
          if (-not $hasTaskReference) {
            Write-Error 'PR body must reference a task or issue, for example #42 or .specs/sprints/sprint-03/07-runtime-probe.task.md.'
          }

      - name: Detect changed files
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          $changed = git diff --name-only $env:BASE_SHA $env:HEAD_SHA
          $changed | Set-Content changed-files.txt

          $architectureTouched = $false
          $cliUxTouched = $false

          foreach ($file in $changed) {
            if ($file -match '^\.specs/architecture/' -or $file -match '^architecture/') {
              $architectureTouched = $true
            }

            if ($file -match '^runtime/cli/' -or
                $file -match '^tests/e2e/' -or
                $file -match '^docs/features/' -or
                $file -match '^playwright\.config\.(js|ts|mjs|cjs)$') {
              $cliUxTouched = $true
            }
          }

          if ($env:PR_BODY -match '(?im)^- \[x\] cli/ux touched$' -or
              $env:PR_BODY -match '(?im)^cli/ux touched:\s*yes$') {
            $cliUxTouched = $true
          }

          "architecture_touched=$architectureTouched" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "cli_ux_touched=$cliUxTouched" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Require ADR reference for architecture changes
        if: steps.scope.outputs.architecture_touched == 'True'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if ($env:PR_BODY -notmatch '(ADR-[0-9]+|adr-[0-9]+)') {
            Write-Error 'Architecture changes require an ADR reference in the PR body.'
          }

      - name: Require Playwright evidence for CLI/UX tasks
        if: steps.scope.outputs.cli_ux_touched == 'True'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          $hasReport = $env:PR_BODY -match 'playwright-report/' -or $env:PR_BODY -match 'test-results/' -or $env:PR_BODY -match 'trace\.zip'
          if (-not $hasReport) {
            Write-Error 'CLI/UX tasks must link Playwright evidence in the PR body (playwright-report/, test-results/, trace.zip, screenshot or video evidence).'
          }

      - name: Upload changed-files manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dod-changed-files
          path: changed-files.txt
          if-no-files-found: warn
          retention-days: 14
