# Scaffold self-check — runs only on the scaffold repo itself
# Validates structure, CLI smoke and npm pack. Downstream copies use ci.yml + dod.yml.

name: Scaffold Self-Check

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: scaffold-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure:
    name: Required scaffold files
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files and folders
        run: |
          set -euo pipefail
          required_files=(
            "AGENTS.md"
            "CLAUDE.md"
            "INIT.md"
            "_BOOTSTRAP.md"
            "README.md"
            "README.pt-BR.md"
            "package.json"
            "bootstrap.sh"
            "bootstrap.ps1"
            "playwright.config.ts"
            "bin/cli.js"
            ".github/workflows/ci.yml"
            ".github/workflows/dod.yml"
          )
          required_dirs=(
            ".agents"
            ".claude"
            ".codex"
            ".github"
            ".skills"
            ".specs"
            "bin"
            "tests"
          )
          missing=0
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::missing required file: $f"
              missing=1
            fi
          done
          for d in "${required_dirs[@]}"; do
            if [ ! -d "$d" ]; then
              echo "::error::missing required dir: $d"
              missing=1
            fi
          done
          exit $missing

      - name: Verify README bilingual headers
        run: |
          set -euo pipefail
          grep -q "README.pt-BR.md" README.md || { echo "::error::README.md missing pt-BR link"; exit 1; }
          grep -q "README.md" README.pt-BR.md || { echo "::error::README.pt-BR.md missing en link"; exit 1; }

  cli-smoke:
    name: CLI smoke (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        node-version: [16, 18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Help command
        run: node bin/cli.js --help

      - name: Version command
        run: node bin/cli.js --version

      - name: Dry-run scaffold (auto-detects from cwd + stack manifests)
        run: |
          mkdir -p /tmp/scaffold-target
          cd /tmp/scaffold-target
          # Synthetic stack manifest so detectStack() picks "next-ts"
          printf '%s\n' '{"name":"scaffold-target","version":"1.0.0","dependencies":{"next":"14.0.0","react":"18.0.0"}}' > package.json
          node $GITHUB_WORKSPACE/bin/cli.js \
            --dry-run \
            --yes \
            --cli skip \
            --append-gitignore no

  npm-pack:
    name: npm pack dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate package.json
        run: node -e "const p=require('./package.json');if(!p.name||!p.version||!p.bin)process.exit(1);console.log('ok',p.name,p.version)"

      - name: Pack dry-run
        run: npm pack --dry-run

  shellcheck:
    name: shellcheck bootstrap.sh
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck
          shellcheck -S warning bootstrap.sh
