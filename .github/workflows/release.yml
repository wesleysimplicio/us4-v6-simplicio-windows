name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

defaults:
  run:
    shell: pwsh

permissions:
  contents: write

env:
  BUILD_DIR: build
  CMAKE_BUILD_TYPE: Release

jobs:
  release:
    name: Build release artifacts
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC developer shell
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node tooling
        run: npm ci

      - name: Configure CMake
        run: >
          cmake -S . -B $env:BUILD_DIR -G Ninja
          -DCMAKE_BUILD_TYPE=$env:CMAKE_BUILD_TYPE
          -DUS4_ENABLE_TESTS=ON
          -DUS4_ENABLE_BENCHMARKS=ON

      - name: Build runtime
        run: cmake --build $env:BUILD_DIR --config $env:CMAKE_BUILD_TYPE --parallel

      - name: Smoke version and probe
        run: |
          .\$env:BUILD_DIR\runtime\cli\us4-cli.exe version
          .\$env:BUILD_DIR\runtime\cli\us4-cli.exe --probe

      - name: Build portable zip
        run: .\scripts\build-portable-zip.ps1 -BuildDir $env:BUILD_DIR -OutputDir dist

      - name: Build unsigned MSIX when packaging tools are available
        run: .\scripts\build-msix.ps1 -BuildDir $env:BUILD_DIR -OutputDir dist
        continue-on-error: true

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/**
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/**
