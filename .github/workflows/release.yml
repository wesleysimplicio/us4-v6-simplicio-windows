name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

defaults:
  run:
    shell: pwsh

permissions:
  contents: write

env:
  BUILD_DIR: build
  CMAKE_BUILD_TYPE: Release

jobs:
  release:
    name: Build release artifacts
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC developer shell
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node tooling
        run: npm ci

      - name: Configure CMake
        run: >
          cmake -S . -B $env:BUILD_DIR -G Ninja
          -DCMAKE_BUILD_TYPE=$env:CMAKE_BUILD_TYPE
          -DUS4_ENABLE_TESTS=ON
          -DUS4_ENABLE_BENCHMARKS=ON

      - name: Build runtime
        run: cmake --build $env:BUILD_DIR --config $env:CMAKE_BUILD_TYPE --parallel

      - name: Release preflight
        run: .\scripts\preflight-release.ps1 -BuildDir $env:BUILD_DIR

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          .\scripts\validate-release-tag.ps1 -Tag $env:GITHUB_REF_NAME -ExpectedVersion $version

      - name: Smoke CLI release surface
        run: |
          $env:US4_PROFILE_STORE_PATH = Join-Path $PWD "dist\release-smoke-profiles.json"
          .\$env:BUILD_DIR\runtime\cli\us4-cli.exe version
          .\$env:BUILD_DIR\runtime\cli\us4-cli.exe --probe
          .\$env:BUILD_DIR\runtime\cli\us4-cli.exe run --model qwen-0.5b --prompt "release smoke" --backend cpu --mode cpu-only --format json
          .\$env:BUILD_DIR\runtime\cli\us4-cli.exe bench --model qwen-0.5b --backend cpu --mode cpu-only --format json
          .\$env:BUILD_DIR\runtime\cli\us4-cli.exe tune --model qwen-0.5b --backend cpu --mode cpu-only --format json

      - name: Build portable zip
        run: .\scripts\build-portable-zip.ps1 -BuildDir $env:BUILD_DIR -OutputDir dist

      - name: Build unsigned MSIX when packaging tools are available
        run: .\scripts\build-msix.ps1 -BuildDir $env:BUILD_DIR -OutputDir dist
        continue-on-error: true

      - name: Sign MSIX when certificate secrets are configured
        if: ${{ secrets.US4_SIGN_CERT_PASSWORD != '' && (secrets.US4_SIGN_CERT_BASE64 != '' || secrets.US4_SIGN_CERT_PATH != '') }}
        env:
          US4_SIGN_CERT_BASE64: ${{ secrets.US4_SIGN_CERT_BASE64 }}
          US4_SIGN_CERT_PATH: ${{ secrets.US4_SIGN_CERT_PATH }}
          US4_SIGN_CERT_PASSWORD: ${{ secrets.US4_SIGN_CERT_PASSWORD }}
        run: |
          $msix = Get-ChildItem -Path dist -Filter *.msix | Select-Object -First 1 -ExpandProperty FullName
          if (-not $msix) {
            throw "MSIX artifact not found for signing."
          }
          .\scripts\sign-msix.ps1 -PackagePath $msix -WorkingDir dist\signing

      - name: Generate release checksums
        run: .\scripts\generate-checksums.ps1 -OutputDir dist

      - name: Render winget manifests
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $parts = $version.Split('.')
          $msixVersion = "{0}.{1}.{2}.0" -f $parts[0], $parts[1], $parts[2]
          $tag = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "v$version" }
          $portableUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$tag/us4-v6-windows-$version-portable.zip"
          $msixUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$tag/us4-v6-windows-$msixVersion.msix"
          .\scripts\render-winget-manifests.ps1 -Version $version -PortableUrl $portableUrl -MsixUrl $msixUrl

      - name: Validate winget manifests
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          .\scripts\validate-winget-manifests.ps1 `
            -ManifestDir packaging\winget\manifests `
            -ExpectedVersion $version `
            -RequirePublishableUrls

      - name: Validate release asset set
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $requireMsix = Test-Path (Join-Path $PWD "dist\*.msix")
          if ($requireMsix) {
            .\scripts\validate-release-assets.ps1 `
              -OutputDir dist `
              -ManifestDir packaging\winget\manifests `
              -ExpectedVersion $version `
              -RequireMsix
          } else {
            .\scripts\validate-release-assets.ps1 `
              -OutputDir dist `
              -ManifestDir packaging\winget\manifests `
              -ExpectedVersion $version
          }

      - name: Render release manifest
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          .\scripts\render-release-manifest.ps1 `
            -OutputDir dist `
            -ManifestDir packaging\winget\manifests `
            -ExpectedVersion $version

      - name: Render release notes
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          .\scripts\render-release-notes.ps1 `
            -Version $version `
            -ChangelogPath CHANGELOG.md `
            -ReleaseManifestPath dist\release-manifest.json `
            -OutputPath dist\release-notes.md

      - name: Smoke portable release artifact
        run: |
          $zip = Get-ChildItem -Path dist -Filter *.zip | Select-Object -First 1 -ExpandProperty FullName
          .\scripts\post-publish-smoke.ps1 -ArtifactPath $zip -WorkingDir dist\portable-smoke

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/**
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: dist/release-notes.md
          files: dist/**
